repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    exclude: mkdocs.yml
  - id: check-added-large-files
    args:
    - --maxkb=500
  - id: check-merge-conflict
  - id: detect-private-key
  - id: detect-aws-credentials
    args:
    - --allow-missing-credentials
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:
  - id: ruff
    args:
    - --fix
  - id: ruff-format
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    args:
    - --baseline
    - .secrets.baseline
- repo: local
  hooks:
  - id: no-aws-tokens
    name: Check for AWS tokens
    entry: (?i)(AWS_BEARER_TOKEN\w*|aws_access_key_id|aws_secret_access_key)\s*[=:]\s*["']?[A-Za-z0-9/+=]{20,}
    language: pygrep
    types:
    - text
  - id: pyright-agent-session-tools
    name: pyright (agent-session-tools)
    language: system
    entry: uv run pyright packages/agent-session-tools/
    pass_filenames: false
    files: ^packages/agent-session-tools/.*\.py$
  - id: pyright-studyctl
    name: pyright (studyctl)
    language: system
    entry: bash -c 'cd packages/studyctl && uv run pyright src/'
    pass_filenames: false
    files: ^packages/studyctl/.*\.py$
  - id: pytest
    name: pytest
    language: system
    entry: uv run pytest --tb=short -m "not integration and not e2e"
    pass_filenames: false
    files: ^packages/.*\.py$
    stages: [pre-push]

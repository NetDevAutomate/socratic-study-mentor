name: Autoresearch Matrix

on:
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Max iterate-runner iterations (1-10)"
        type: number
        default: 1

permissions:
  contents: read

jobs:
  harness:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install system deps
        run: brew install tmux

      - name: Install Python deps
        run: uv sync --all-packages --extra dev --extra test --extra tui

      - name: Run matrix tests
        run: |
          uv run pytest packages/studyctl/tests/test_harness_matrix.py \
            --junitxml=results/matrix.xml \
            --tb=short -v

      - name: Run iterate runner + report
        run: |
          uv run python scripts/test_iterate.py \
            --report \
            --no-git-check \
            --max-iterations ${{ inputs.max_iterations || 1 }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-results-${{ github.run_id }}
          path: |
            results/
            docs/reports/
            results.tsv
          retention-days: 30
          if-no-files-found: warn

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1b26">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Study Session</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml">
  <!-- HTMX + SSE extension (vendored for offline PWA) -->
  <script src="/vendor/js/htmx-2.0.4.min.js"></script>
  <script src="/vendor/js/htmx-ext-sse-2.2.2.js"></script>
  <!-- Alpine.js (vendored for offline PWA) -->
  <script defer src="/vendor/js/alpine-3.14.8.min.js"></script>
</head>
<body>
  <header>
    <h1><a href="/" class="header-link">Socratic Study Mentor</a></h1>
    <div class="header-controls">
      <a href="/" class="toggle-btn" title="Back to courses">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </a>
    </div>
  </header>

  <main id="app">
    <!-- Split-pane layout: dashboard + terminal with draggable divider -->
    <div class="split-container" x-data="splitLayout()" :class="{ 'split-horizontal': layout === 'side' }">

      <!-- Dashboard panel -->
      <div class="split-panel split-dashboard" :style="dashboardStyle">
        <div class="session-dashboard"
             x-data="sessionTimer()"
             x-init="init()">

          <!-- Timer bar -->
          <div class="session-timer" :class="timerPhase">
            <div class="timer-display">
              <span class="timer-icon" x-text="timerIcon"></span>
              <span class="timer-time" x-text="display"></span>
              <div class="timer-bar-track">
                <div class="timer-bar-fill" :class="timerPhase"
                     :style="`width: ${progress}%`"></div>
              </div>
              <div class="timer-controls">
                <button class="timer-btn" @click="togglePause()"
                        :title="paused ? 'Resume' : 'Pause'"
                        x-text="paused ? '\u25b6' : '\u23f8'"></button>
                <button class="timer-btn" @click="resetTimer()" title="Reset">
                  &#8634;
                </button>
              </div>
            </div>
            <div class="timer-message" x-show="message || paused" x-transition.opacity>
              <span x-show="paused" class="timer-paused-label">Paused</span>
              <span x-show="message && !paused" x-text="message"></span>
            </div>
          </div>

          <!-- Session metadata (OOB swap target) -->
          <div id="session-meta" class="session-meta">
            <span class="meta-topic" x-text="topic">Loading...</span>
            <span class="meta-energy">&#9889; Energy: <span x-text="energy + '/10'"></span></span>
          </div>

          <!-- Activity feed (SSE swap target) -->
          <div hx-ext="sse" sse-connect="/api/session/stream" sse-close="close">
            <div id="activity-feed" class="activity-feed" sse-swap="session-update">
              <p class="activity-empty">Connecting to session...</p>
            </div>
          </div>

          <!-- Counter bar (OOB swap targets) -->
          <div class="counter-bar">
            <span id="counter-wins" class="counter counter-wins">&#10003; WINS: 0</span>
            <span id="counter-parked" class="counter counter-parked">&#9675; PARKED: 0</span>
            <span id="counter-review" class="counter counter-review">&#9650; REVIEW: 0</span>
          </div>
        </div>
      </div>

      <!-- Draggable divider -->
      <div class="split-divider" x-show="terminalAvailable"
           @mousedown="startDrag($event)"
           @touchstart.prevent="startDrag($event)">
        <div class="divider-handle"></div>
      </div>

      <!-- Terminal panel -->
      <div class="split-panel split-terminal" x-show="terminalAvailable" :style="terminalStyle">
        <div class="terminal-panel" x-data="terminalPanel()" x-show="available">
          <div class="terminal-header">
            <span class="terminal-title">Agent Terminal</span>
            <div class="terminal-controls">
              <button class="timer-btn" @click="$dispatch('toggle-layout')"
                      title="Toggle stacked/side-by-side">&#x21c4;</button>
              <button class="timer-btn" @click="$dispatch('swap-panels')"
                      title="Swap panel order">&#x21c5;</button>
              <button class="timer-btn" @click="toggleEmbed()"
                      :title="embedded ? 'Hide terminal' : 'Show terminal'"
                      x-text="embedded ? '\u2796' : '\u2795'"></button>
              <button class="timer-btn" @click="popOut()" title="Open in new window">
                &#x29c9;
              </button>
            </div>
          </div>
          <div class="terminal-content">
            <!-- Iframe is ALWAYS in DOM to preserve the WebSocket connection.
                 CSS visibility hides it without triggering unload/reload.
                 The same-origin proxy means the WS survives pop-out round-trips. -->
            <iframe :src="ttydUrl"
                    class="terminal-iframe"
                    :style="embedded ? '' : 'visibility:hidden;position:absolute;pointer-events:none'"
                    allow="clipboard-read; clipboard-write">
            </iframe>
            <div x-show="!embedded && poppedOut" class="terminal-placeholder">
              <div>Terminal opened in separate window</div>
              <div class="placeholder-hint">Click <strong>+</strong> to close the pop-out and return terminal here</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
  /* Energy-adaptive timer thresholds (from break-science.md) */
  const THRESHOLDS = {
    high:   { green: 25, amber: 50 },  /* energy 7-10 */
    medium: { green: 20, amber: 40 },  /* energy 4-6 */
    low:    { green: 15, amber: 30 },  /* energy 1-3 */
  };

  function energyBand(energy) {
    if (energy >= 7) return 'high';
    if (energy >= 4) return 'medium';
    return 'low';
  }

  function sessionTimer() {
    return {
      startTime: null,
      energy: 5,
      topic: 'Loading...',
      elapsed: 0,
      interval: null,
      message: '',
      messageTimeout: null,
      sessionActive: false,
      paused: false,
      pausedAt: 0,

      async init() {
        try {
          const res = await fetch('/api/session/state');
          const state = await res.json();
          if (state.study_session_id) {
            this.energy = state.energy || 5;
            this.topic = state.topic || 'Study Session';
            this.startTime = state.start_time ? new Date(state.start_time) : new Date();
            this.sessionActive = true;
            this.tick();
            this.interval = setInterval(() => this.tick(), 1000);
          } else {
            this.topic = 'No active session';
          }
        } catch {
          this.topic = 'Could not load session';
        }
      },

      togglePause() {
        if (!this.sessionActive) return;
        if (this.paused) {
          /* Resume: shift startTime forward by the paused duration */
          const pauseDuration = Date.now() - this.pausedAt;
          this.startTime = new Date(this.startTime.getTime() + pauseDuration);
          this.paused = false;
          this.interval = setInterval(() => this.tick(), 1000);
        } else {
          /* Pause: stop ticking, record when we paused */
          this.paused = true;
          this.pausedAt = Date.now();
          clearInterval(this.interval);
        }
      },

      resetTimer() {
        if (!this.sessionActive) return;
        this.startTime = new Date();
        this.elapsed = 0;
        this.paused = false;
        this._shownAmber = false;
        this._shownRed = false;
        this.message = '';
        clearInterval(this.interval);
        this.interval = setInterval(() => this.tick(), 1000);
      },

      tick() {
        if (!this.startTime || this.paused) return;
        this.elapsed = Math.floor((Date.now() - this.startTime.getTime()) / 1000);
        this.checkThresholds();
      },

      checkThresholds() {
        const mins = this.elapsed / 60;
        const band = energyBand(this.energy);
        const th = THRESHOLDS[band];

        /* Show message once at each threshold crossing */
        if (mins >= th.amber && !this._shownRed) {
          this._shownRed = true;
          this.showMessage("Your brain's been at this for a while. Just flagging it.");
        } else if (mins >= th.green && !this._shownAmber) {
          this._shownAmber = true;
          /* Amber: silent color shift only, no text for high energy */
          if (this.energy < 7) {
            this.showMessage("Good stretch of focus. A micro-break soon?");
          }
        }
      },

      showMessage(msg) {
        this.message = msg;
        clearTimeout(this.messageTimeout);
        this.messageTimeout = setTimeout(() => { this.message = ''; }, 15000);
      },

      get display() {
        const m = Math.floor(this.elapsed / 60);
        const s = this.elapsed % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      },

      get progress() {
        if (!this.sessionActive) return 0;
        const mins = this.elapsed / 60;
        const band = energyBand(this.energy);
        const th = THRESHOLDS[band];
        /* Progress fills to 100% at the amber threshold */
        return Math.min(100, (mins / th.amber) * 100);
      },

      get timerPhase() {
        if (!this.sessionActive) return 'phase-idle';
        const mins = this.elapsed / 60;
        const band = energyBand(this.energy);
        const th = THRESHOLDS[band];
        if (mins >= th.amber) return 'phase-red';
        if (mins >= th.green) return 'phase-amber';
        return 'phase-green';
      },

      get timerIcon() {
        if (!this.sessionActive) return '\u23f1';
        const phase = this.timerPhase;
        if (phase === 'phase-red') return '\ud83d\udfe5';
        if (phase === 'phase-amber') return '\ud83d\udfe7';
        return '\ud83d\udfe9';
      },

      destroy() {
        clearInterval(this.interval);
        clearTimeout(this.messageTimeout);
      }
    };
  }

  /* Notification permission is requested on user gesture only.
     The timer-btn clicks in the Alpine component can call
     Notification.requestPermission() when the user interacts. */

  function terminalPanel() {
    return {
      available: false,
      embedded: true,
      poppedOut: false,
      _popoutWindow: null,

      /* Same-origin proxy path — avoids cross-origin iframe WebSocket drops */
      get ttydUrl() {
        return '/terminal/';
      },

      async init() {
        try {
          const res = await fetch('/api/session/state');
          const state = await res.json();
          if (state.ttyd_port) {
            this.available = true;
            this.$dispatch('terminal-ready', { available: true });
          }
        } catch { /* ttyd not available */ }
      },

      toggleEmbed() {
        if (!this.embedded && this._popoutWindow) {
          /* Returning from pop-out: close the external window */
          try { this._popoutWindow.close(); } catch {}
          this._popoutWindow = null;
        }
        this.embedded = !this.embedded;
        this.poppedOut = false;
      },

      popOut() {
        /* Open same-origin /terminal/ in a named window.
           Using a named window means clicking pop-out again focuses
           the existing window rather than opening a second one. */
        this._popoutWindow = window.open('/terminal/', 'studyctl-terminal',
          'width=900,height=600,menubar=no,toolbar=no');
        this.embedded = false;
        this.poppedOut = true;
      }
    };
  }

  function splitLayout() {
    return {
      layout: 'stack',       /* 'stack' (vertical) or 'side' (horizontal) */
      splitPercent: 40,      /* dashboard gets this %, terminal gets the rest */
      swapped: false,
      dragging: false,
      terminalAvailable: false,

      init() {
        /* Listen for terminal availability */
        this.$el.addEventListener('terminal-ready', (e) => {
          this.terminalAvailable = e.detail.available;
        });
        this.$el.addEventListener('toggle-layout', () => {
          this.layout = this.layout === 'stack' ? 'side' : 'stack';
          this.splitPercent = this.layout === 'side' ? 50 : 40;
        });
        this.$el.addEventListener('swap-panels', () => {
          this.swapped = !this.swapped;
          this.$el.style.flexDirection = this.swapped
            ? (this.layout === 'side' ? 'row-reverse' : 'column-reverse')
            : '';
        });
        /* Track mouse/touch during drag */
        const onMove = (e) => { if (this.dragging) this._onDrag(e); };
        const onUp = () => { this.dragging = false; document.body.style.cursor = ''; };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove);
        document.addEventListener('touchend', onUp);
      },

      startDrag(e) {
        this.dragging = true;
        document.body.style.cursor = this.layout === 'side' ? 'col-resize' : 'row-resize';
        e.preventDefault();
      },

      _onDrag(e) {
        const rect = this.$el.getBoundingClientRect();
        const clientPos = e.touches ? e.touches[0] : e;
        let pct;
        if (this.layout === 'side') {
          pct = ((clientPos.clientX - rect.left) / rect.width) * 100;
        } else {
          pct = ((clientPos.clientY - rect.top) / rect.height) * 100;
        }
        /* Clamp between 20% and 80% */
        this.splitPercent = Math.max(20, Math.min(80, this.swapped ? 100 - pct : pct));
      },

      get dashboardStyle() {
        if (!this.terminalAvailable) return '';
        return this.layout === 'side'
          ? `width: ${this.splitPercent}%`
          : `height: ${this.splitPercent}%`;
      },

      get terminalStyle() {
        if (!this.terminalAvailable) return '';
        return this.layout === 'side'
          ? `width: ${100 - this.splitPercent}%`
          : `height: ${100 - this.splitPercent}%`;
      }
    };
  }
  </script>
</body>
</html>

# studyctl study session tmux config
# Loaded via source-file — does NOT replace ~/.tmux.conf or ~/.config/tmux/tmux.conf
# Only affects the study session, not the user's other tmux sessions.

# --- Status bar ---
set -g status-position top
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
set -g status-left " #S "
set -g status-right '#(cat ~/.config/studyctl/session-oneline.txt 2>/dev/null || echo "No session") '

# --- Colours (catppuccin Mocha-inspired) ---
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g status-right-style "bg=#313244,fg=#a6adc8"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"

# --- Pane borders ---
set -g pane-border-lines single
set -g pane-border-status off

# --- Behaviour ---
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0

# --- Quick park popup (prefix + p) ---
bind-key p display-popup -E -w 60% -h 30% -T " Quick Park " \
  'printf "> "; read q; studyctl park "$q"'

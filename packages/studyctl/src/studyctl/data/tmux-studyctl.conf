# studyctl study session — minimal overlay
#
# Loaded via source-file on top of the user's existing tmux.conf.
# Only adds study-specific features. Does NOT override:
#   - prefix key
#   - keybindings
#   - colours / theme (catppuccin, dracula, etc.)
#   - mouse settings
#   - base-index
#
# To override this, place your own at ~/.config/studyctl/tmux-studyctl.conf

# --- Study session status bar (right side only) ---
# Reads the pre-formatted oneline file written by the Textual sidebar.
# Left side and styling are left to the user's theme.
set -g status-right '#(cat ~/.config/studyctl/session-oneline.txt 2>/dev/null || echo "No session") '
set -g status-right-length 80
set -g status-interval 5

# --- Quick park popup (prefix + p) ---
# Opens a floating popup to park a tangential topic mid-session.
bind-key p display-popup -E -w 60% -h 30% -T " Quick Park " \
  'printf "> "; read q; studyctl park "$q"'

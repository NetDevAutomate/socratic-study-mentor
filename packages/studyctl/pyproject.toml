[project]
name = "studyctl"
version = "1.0.0"
description = "AuDHD study pipeline: Obsidian → NotebookLM sync, spaced repetition, study plan management"
requires-python = ">=3.12"
readme = "README.md"
license = "MIT"
authors = [{name = "Andy Taylor"}]
dependencies = [
    "click>=8.1",
    "rich>=13.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
notebooklm = ["notebooklm-py"]

[project.scripts]
studyctl = "studyctl.cli:cli"

[project.urls]
Homepage = "<your-repo-url>/socratic-study-mentor"
Repository = "<your-repo-url>/socratic-study-mentor"
Issues = "<your-repo-url>/socratic-study-mentor/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/studyctl"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "SIM", "TCH", "RUF"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"

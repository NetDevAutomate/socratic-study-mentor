[project]
name = "agent-session-tools"
version = "2.0.0"
description = "Session management tools for Claude Code and Kiro CLI conversations"
authors = [
    {name = "Andy Taylor"}
]
requires-python = ">=3.12"
dependencies = [
    "rich>=13.7.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
    "typer>=0.9.0",
]
readme = "README.md"
license = "MIT"
keywords = ["claude", "kiro", "ai", "sessions", "sqlite", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/NetDevAutomate/Socratic-Study-Mentor"
Documentation = "https://github.com/NetDevAutomate/Socratic-Study-Mentor#readme"
Repository = "https://github.com/NetDevAutomate/Socratic-Study-Mentor"
Issues = "https://github.com/NetDevAutomate/Socratic-Study-Mentor/issues"

[project.scripts]
session-export = "agent_session_tools.export_sessions:main"
session-query = "agent_session_tools.query_sessions:main"
session-maint = "agent_session_tools.maintenance:main"
session-sync = "agent_session_tools.sync:main"
tutor-checkpoint = "agent_session_tools.tutor_checkpoint:main"
study-speak = "agent_session_tools.speak:main"

[project.optional-dependencies]
tokens = [
    "tiktoken>=0.5.0",
]
tui = [
    "textual>=0.40.0",
]
watch = [
    "watchdog>=4.0.0",
]
semantic = [
    "sentence-transformers>=2.2.0",
    "numpy>=1.24.0",
    "einops>=0.8.2",
]
tts = [
    "kokoro-onnx>=0.4.0",
    "sounddevice>=0.5.0",
    "numpy>=1.24.0",
    "mcp[cli]>=1.0.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.0",
    "pyright>=1.1.0",
]
test = [
    "sqlite-vec>=0.1.6",
]
all = [
    "tiktoken>=0.5.0",
    "textual>=0.40.0",
    "watchdog>=4.0.0",
    "sentence-transformers>=2.2.0",
    "numpy>=1.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_session_tools"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/LICENSE",
]

[dependency-groups]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.0",
    "pyright>=1.1.0",
    "pre-commit>=3.5.0",
]

[tool.ruff.lint.isort]
known-first-party = ["agent_session_tools"]

[tool.pyright]
include = ["src"]
exclude = ["**/__pycache__"]
pythonVersion = "3.12"
typeCheckingMode = "basic"
reportMissingImports = true
reportMissingTypeStubs = false

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --tb=short"
markers = [
    "live: marks tests that require live database (deselect with '-m \"not live\"')",
]

[tool.coverage.run]
source = ["src/agent_session_tools"]
branch = true
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
